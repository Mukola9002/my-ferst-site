<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кулінарний блог Ярошенко</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <div class="container">
            <div class="logo">Ярошенко <span> КОРЖИК</span></div>
        </div>
    </header>

    <main class="container">
        <!-- Секція Табів -->
        <section class="tabs-container">
            <div class="tabs-header">
                <button class="tab-btn active">Всі рецепти</button>
                <button class="tab-btn">Сніданки</button>
                <button class="tab-btn">Перші страви</button>
                <button class="tab-btn">М'ясні шедеври</button>
                <button class="tab-btn">Десерти</button>
            </div>
            
            <div class="tabs-content">
                <div class="grid-layout">
                    <!-- Основний контент (сітка карток) -->
                    <div class="main-content">
                        <div class="recipe-grid">
                            <div class="card">Борщ по-домашньому</div>
                            <div class="card">Запечена качка</div>
                            <div class="card">Вареники з вишнею</div>
                            <div class="card">Котлета по-київськи</div>
                        </div>
                    </div>

                    <!-- Сайдбар -->
                    <aside class="sidebar">
                        <div class="sidebar-block profile">Автор: Ярошенко</div>
                        <div class="sidebar-block newsletter">Підписка на рецепти</div>
                    </aside>
               
    </main>

    <footer class="footer">
        <p>&copy; 2026 Кулінарний щоденник Ярошенко</p>
		<a href="">цікаве</a>
        <a href="">фото</a>
        <a href="">навчання</a>
        <a href="">замовлення</a>
		 
    </footer>

</body>
</html>
